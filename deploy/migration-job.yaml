apiVersion: batch/v1
kind: Job
metadata:
  name: fusion-access-migration
  namespace: fusion-access-migration
spec:
  backoffLimit: 20
  podFailurePolicy:
    rules:
      - action: FailJob
        onExitCodes:
          operator: In
          values: [42]
  template:
    spec:
      serviceAccountName: fusion-access-migration
      restartPolicy: Never
      containers:
        - name: migrate
          image: quay.io/ocs-dev/fusion-access-migration-tool:latest
          imagePullPolicy: Always
          env:
            - name: MIGRATION_DRY_RUN
              value: "false"
            - name: MIGRATION_STATE_CONFIGMAP_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MIGRATION_STATE_CONFIGMAP_NAME
              value: "fusion-access-migration-state"
            - name: FDF_CATALOG_IMAGE
              value: "cp.stg.icr.io/cp/df/isf-data-foundation-catalog:4.21.3-2"
